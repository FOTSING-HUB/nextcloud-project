version: "3.9"

# ==============================================================
# Réseaux internes - isolation des services
# ==============================================================
networks:
  frontend:       # Nginx <-> Apps Nextcloud
    driver: bridge
  backend:        # Apps Nextcloud <-> DB, Redis
    driver: bridge
  monitoring:     # Prometheus, Grafana, Loki
    driver: bridge

# ==============================================================
# Volumes persistants - les données survivent aux redémarrages
# ==============================================================
volumes:
  nextcloud_data:     # Fichiers utilisateurs Nextcloud
  nextcloud_config:   # Configuration Nextcloud
  nextcloud_apps:     # Applications Nextcloud
  postgres_data:      # Données PostgreSQL
  redis_data:         # Cache Redis
  nginx_certs:        # Certificats SSL
  prometheus_data:    # Métriques Prometheus
  grafana_data:       # Dashboards Grafana
  loki_data:          # Logs centralisés

# ==============================================================
# Services
# ==============================================================
services:

  # ---- Génération certificat SSL self-signed (init container) ----
  ssl-init:
    image: alpine/openssl
    container_name: ssl_init
    volumes:
      - nginx_certs:/etc/nginx/certs
      - ./nginx/ssl-init.sh:/ssl-init.sh:ro
    entrypoint: ["sh", "/ssl-init.sh"]
    restart: "no"

  # ---- WAF ModSecurity (OWASP CRS) - point d'entrée public ----
  modsecurity:
    image: owasp/modsecurity-crs:nginx-alpine
    container_name: modsecurity_waf
    restart: unless-stopped
    ports:
      - "80:8080"
      - "443:8443"
    environment:
      - BACKEND=http://nginx:8080
      - MODSEC_RULE_ENGINE=On
      - MODSEC_REQ_BODY_LIMIT=10737418240
      - PARANOIA=1
      - ANOMALY_INBOUND=5
      - ANOMALY_OUTBOUND=4
      - SSL_CERT=/etc/nginx/certs/fullchain.pem
      - SSL_CERT_KEY=/etc/nginx/certs/privkey.pem
    volumes:
      - nginx_certs:/etc/nginx/certs:ro
    networks:
      - frontend
    depends_on:
      ssl-init:
        condition: service_completed_successfully
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---- Reverse Proxy + Load Balancer (interne) ----
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nextcloud_data:/var/www/html:ro
    networks:
      - frontend
    depends_on:
      nextcloud_app1:
        condition: service_healthy
      nextcloud_app2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---- Instance Nextcloud #1 ----
  nextcloud_app1:
    build:
      context: ./nextcloud
      dockerfile: Dockerfile
    image: nextcloud-custom:latest   # En prod, remplacé par ECR_REGISTRY/ECR_REPOSITORY:latest
    container_name: nextcloud_app1
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
      - REDIS_HOST=redis
      - REDIS_HOST_PASSWORD=${REDIS_PASSWORD}
      - PHP_MEMORY_LIMIT=${PHP_MEMORY_LIMIT}
      - PHP_UPLOAD_LIMIT=${PHP_UPLOAD_LIMIT}
    volumes:
      - nextcloud_data:/var/www/html/data
      - nextcloud_config:/var/www/html/config
      - nextcloud_apps:/var/www/html/custom_apps
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>&1 | grep -q 'successful'|| kill -0 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---- Instance Nextcloud #2 ----
  nextcloud_app2:
    build:
      context: ./nextcloud
      dockerfile: Dockerfile
    image: nextcloud-custom:latest   # En prod, remplacé par ECR_REGISTRY/ECR_REPOSITORY:latest
    container_name: nextcloud_app2
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
      - REDIS_HOST=redis
      - REDIS_HOST_PASSWORD=${REDIS_PASSWORD}
      - PHP_MEMORY_LIMIT=${PHP_MEMORY_LIMIT}
      - PHP_UPLOAD_LIMIT=${PHP_UPLOAD_LIMIT}
    volumes:
      - nextcloud_data:/var/www/html/data     # Même volume partagé !
      - nextcloud_config:/var/www/html/config
      - nextcloud_apps:/var/www/html/custom_apps
    networks:
      - frontend
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>&1 | grep -q 'successful'|| kill -0 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---- Base de données PostgreSQL ----
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: unless-stopped
    user: "70:70"    # postgres : conteneur non-root
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---- Cache Redis ----
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---- Cron Nextcloud (tâches de fond) ----
  nextcloud_cron:
    build:
      context: ./nextcloud
      dockerfile: Dockerfile
    image: nextcloud-custom:latest   # En prod, remplacé par ECR_REGISTRY/ECR_REPOSITORY:latest
    container_name: nextcloud_cron
    restart: unless-stopped
    entrypoint: /cron.sh
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_HOST_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - nextcloud_data:/var/www/html/data
      - nextcloud_config:/var/www/html/config
      - nextcloud_apps:/var/www/html/custom_apps
    networks:
      - backend
    depends_on:
      - nextcloud_app1

  # ---- Prometheus (collecte métriques) ----
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- Grafana (dashboards) ----
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    user: "472"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    networks:
      - monitoring
    depends_on:
      - prometheus
    ports:
      - "3000:3000"    # Accès direct pour l'admin (à sécuriser en prod)

  # ---- Loki (logs centralisés) ----
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - monitoring

  # ---- Promtail (collecte logs Docker -> Loki) ----
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    depends_on:
      - loki
