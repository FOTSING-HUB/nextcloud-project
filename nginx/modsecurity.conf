# ==============================================================
# ModSecurity WAF - Configuration pour Nextcloud
# OWASP Core Rule Set activé
# ==============================================================

# WAF actif - bloque les requêtes malveillantes
SecRuleEngine On

# Taille max du corps de requête (doit correspondre à nginx/PHP)
SecRequestBodyLimit 10737418240
SecRequestBodyNoFilesLimit 131072

# Activer les logs détaillés
SecAuditEngine RelevantOnly
SecAuditLogParts ABCFHZ
SecAuditLog /var/log/modsecurity/audit.log

# Niveau de log (0=Emergency ... 9=Debug)
SecDebugLogLevel 0

# --- Exclusions pour Nextcloud (éviter les faux positifs) ---
# Les uploads de fichiers déclenchent souvent des alertes
SecRule REQUEST_URI "@beginsWith /remote.php/webdav" \
    "id:1001,phase:1,pass,nolog,ctl:ruleEngine=Off"

SecRule REQUEST_URI "@beginsWith /remote.php/dav" \
    "id:1002,phase:1,pass,nolog,ctl:ruleEngine=Off"

# L'API Nextcloud utilise des payloads JSON légitimes
SecRule REQUEST_URI "@beginsWith /ocs/v" \
    "id:1003,phase:1,pass,nolog,ctl:ruleEngine=Off"

# --- Règles personnalisées ---
# Bloquer les tentatives de scanner de vulnérabilités courants
SecRule REQUEST_HEADERS:User-Agent "@rx (nikto|sqlmap|nessus|masscan|zgrab)" \
    "id:2001,phase:1,deny,status:403,log,msg:'Scanner blocked'"
