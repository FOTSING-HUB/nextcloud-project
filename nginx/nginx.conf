worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 10G;
    client_body_timeout 3600s;

    # Load Balancer vers les 2 instances Nextcloud (PHP-FPM)
    upstream nextcloud_backend {
        least_conn;
        server nextcloud_app1:9000 weight=1 max_fails=3 fail_timeout=30s;
        server nextcloud_app2:9000 weight=1 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 8080;
        server_name _;

        root /var/www/html;
        index index.php index.html;

        # Healthcheck interne
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Headers de sécurité
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location ~ /\.(ht|git|env) {
            deny all;
            return 404;
        }

        # PHP-FPM via load balancer
        location ~ \.php$ {
            fastcgi_split_path_info ^(.+\.php)(/.*)$;
            fastcgi_pass nextcloud_backend;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_param HTTPS on;
            fastcgi_read_timeout 3600s;
            fastcgi_send_timeout 3600s;
            fastcgi_buffers 64 4k;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        location / {
            rewrite ^ /index.php;
        }

        location = /.well-known/carddav {
            return 301 $scheme://$host/remote.php/dav;
        }
        location = /.well-known/caldav {
            return 301 $scheme://$host/remote.php/dav;
        }

        location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)/ {
            deny all;
        }
    }
}
